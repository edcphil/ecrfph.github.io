<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EC Rattan Furniture Philippines</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 1. LOGO SA TAAS -->
  <header>
    <img src="logo.png" alt="EC Rattan Logo" class="top-logo">
  </header>

  <!-- 2. HERO SECTION NA MAY BACKGROUND -->
  <section class="hero">
    <h1>Handcrafted Rattan <br> Furniture</h1>
    <p>Timeless Designs, Modern Comfort</p>
    <a href="#products" class="shopBtn">Shop Now</a>
  </section>

  <!-- 3. PRODUCTS SECTION -->
  <section id="products" class="gallery">
    <h2>Our Bestsellers</h2>
    <img src="rattan2.jpg" alt="Rattan Products">
  </section>

  <!-- 4. CONTACT SECTION -->
  <section id="contact" class="contact">
    <h2>Contact Us</h2>
    <p>📱 0917-123-4567</p>
    <p>📍 Iloilo City, Philippines</p>
  </section>

  <!-- 5. BOTTOM MENU -->
  <nav class="bottom-nav">
    <a href="#"><span>🏠</span>Home</a>
    <a href="#products"><span>🛍️</span>Store</a>
    <a href="tel:09171234567"><span>📱</span>Call Us</a>
    <a href="#contact"><span>✉️</span>Contact</a>
  </nav>

  <!-- ITO NA YUNG JAVA/JAVASCRIPT -->
  <script>
    // Smooth Scroll - para dahan2 pag click ng menu
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        document.querySelector(this.getAttribute('href')).scrollIntoView({
          behavior: 'smooth'
        });
      });
    });

    // Pop-up pag click ng Shop Now
    document.querySelector('.shopBtn').addEventListener('click', function(e) {
      // aalisin yung default para mag smooth scroll muna
    });
  </script>

</body>
</html>
